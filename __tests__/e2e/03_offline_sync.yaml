appId: com.silveyy.todo
---
- evalScript: ${output.timestamp = new Date().getTime(); output.listName = 'Offline List ' + output.timestamp; output.todoTitle = 'Offline todo ' + output.timestamp}
- launchApp:
    clearState: true
- runFlow:
    file: helpers/login.yaml
    env:
      EMAIL: ${TEST_USER_A_EMAIL}
      PASSWORD: ${TEST_USER_A_PASSWORD}
- tapOn:
    id: "create-list-fab"
- tapOn:
    id: "create-list-input"
- inputText: ${output.listName}
- tapOn:
    id: "create-list-submit"
- assertVisible:
    id: "list-detail-screen"
- setAirplaneMode: enabled
- tapOn:
    id: "add-todo-fab"
- tapOn:
    id: "todo-title-input"
- inputText: ${output.todoTitle}
- tapOn:
    id: "todo-submit-button"
- assertVisible:
    id: "sync-banner"
- assertVisible:
    id: "sync-banner-offline"
- assertVisible: ${output.todoTitle}
- setAirplaneMode: disabled
- assertNotVisible:
    id: "sync-banner-offline"
- assertVisible: ${output.todoTitle}
