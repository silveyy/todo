appId: com.silveyy.todo
---
- evalScript: ${output.timestamp = new Date().getTime(); output.listName = 'Shared List ' + output.timestamp; output.todoTitle = 'User B todo ' + output.timestamp}

# Session 1: User A
- launchApp:
    clearState: true
- runFlow:
    file: helpers/login.yaml
    env:
      EMAIL: ${TEST_USER_A_EMAIL}
      PASSWORD: ${TEST_USER_A_PASSWORD}
- tapOn:
    id: "create-list-fab"
- tapOn:
    id: "create-list-input"
- inputText: ${output.listName}
- tapOn:
    id: "create-list-submit"
- assertVisible:
    id: "list-detail-screen"
- assertNotVisible:
    id: "sync-banner-pending"
- tapOn:
    id: "share-button"
- tapOn:
    id: "share-email-input"
- inputText: ${TEST_USER_B_EMAIL}
- tapOn:
    id: "share-send-button"
- assertVisible:
    id: "invite-link-text"
- copyTextFrom:
    id: "invite-link-text"

# Session 2: User B
- stopApp
- launchApp:
    clearState: true
- runFlow:
    file: helpers/login.yaml
    env:
      EMAIL: ${TEST_USER_B_EMAIL}
      PASSWORD: ${TEST_USER_B_PASSWORD}
- openLink: ${maestro.copiedText}
- assertVisible: ${output.listName}
- tapOn: ${output.listName}
- tapOn:
    id: "add-todo-fab"
- tapOn:
    id: "todo-title-input"
- inputText: ${output.todoTitle}
- tapOn:
    id: "todo-submit-button"
- assertVisible: ${output.todoTitle}
- assertNotVisible:
    id: "sync-banner-pending"

# Session 3: Back to User A
- stopApp
- launchApp:
    clearState: true
- runFlow:
    file: helpers/login.yaml
    env:
      EMAIL: ${TEST_USER_A_EMAIL}
      PASSWORD: ${TEST_USER_A_PASSWORD}
- assertVisible: ${output.listName}
- tapOn: ${output.listName}
- assertVisible: ${output.todoTitle}
